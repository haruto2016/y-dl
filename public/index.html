<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="glass-container">
        <header>
            <h1 class="gradient-text">YT Downloader</h1>
            <p>高品質な動画や音声をURLから直接ダウンロード</p>
        </header>

        <section class="download-section">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
                <div class="input-focus-bg"></div>
            </div>

            <div class="error-msg" id="error-msg">有効なYouTube URLを入力してください。</div>

            <div class="button-group">
                <button id="btn-video" class="btn btn-video">
                    <span class="icon">
                        <!-- Video Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </span>
                    ビデオ (MP4)
                </button>
                <button id="btn-audio" class="btn btn-audio">
                    <span class="icon">
                        <!-- Audio Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="2.5"></circle><circle cx="17.5" cy="15.5" r="2.5"></circle><path d="M8 17V5l12-2v12"></path></svg>
                    </span>
                    音声のみ (MP3)
                </button>
                <button id="btn-gif" class="btn btn-gif">
                    <span class="icon">
                        <!-- GIF Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><circle cx="8.5" cy="12" r="1.5"></circle><path d="M12.5 12h5"></path><path d="M15 9.5v5"></path></svg>
                    </span>
                    GIF化 (Scratch用)
                </button>
            </div>
            
            <!-- Loading Modal Overlay -->
            <div id="loading-overlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p id="loading-text">ダウンロードの準備中...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
